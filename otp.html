<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify OTP - Farm2Market</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #ecfdf3, #f9fafb);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .otp-shell {
      width: 100%;
      max-width: 480px;
      padding: 1.5rem;
    }
    .otp-card {
      background: white;
      border-radius: 1.25rem;
      padding: 2rem 2.25rem;
      box-shadow: 0 24px 80px rgba(15, 118, 110, 0.25);
      border: 1px solid rgba(16, 185, 129, 0.2);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .otp-pill {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at -10% -10%, rgba(34, 197, 94, 0.2), transparent 50%),
                  radial-gradient(circle at 110% 110%, rgba(56, 189, 248, 0.18), transparent 55%);
      opacity: 0.9;
    }
    .otp-header {
      position: relative;
      z-index: 1;
      margin-bottom: 1.5rem;
    }
    .otp-icon-badge {
      width: 70px;
      height: 70px;
      border-radius: 999px;
      margin: 0 auto 1rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 14px 35px rgba(22, 163, 74, 0.45);
    }
    .otp-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #064e3b;
      margin-bottom: 0.35rem;
    }
    .otp-subtitle {
      font-size: 0.95rem;
      color: #6b7280;
    }
    .otp-form {
      position: relative;
      z-index: 1;
      margin-top: 1.75rem;
    }
    .otp-inputs {
      display: flex;
      justify-content: center;
      gap: 0.65rem;
      margin-bottom: 1.25rem;
    }
    .otp-box {
      width: 46px;
      height: 52px;
      border-radius: 0.9rem;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      font-size: 1.4rem;
      text-align: center;
      outline: none;
      transition: all 0.2s ease;
    }
    .otp-box:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.25);
      background: #ffffff;
    }
    .otp-message {
      min-height: 1.25rem;
      font-size: 0.88rem;
      margin-bottom: 0.75rem;
    }
    .otp-message.error {
      color: #b91c1c;
    }
    .otp-message.success {
      color: #15803d;
    }
    .otp-button {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }
    .otp-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(22, 163, 74, 0.45);
    }
    .otp-button:disabled {
      opacity: 0.5;
      cursor: default;
      box-shadow: none;
      transform: none;
    }
    .otp-footer {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #6b7280;
    }
    .otp-role-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      margin-top: 0.4rem;
      background: rgba(16, 185, 129, 0.1);
      color: #047857;
    }
  </style>
</head>
<body>
  <div class="otp-shell">
    <div class="otp-card" id="otpCard">
      <div class="otp-pill"></div>
      <div class="otp-header">
        <div class="otp-icon-badge" id="otpIconBadge">

          <svg viewBox="0 0 24 24" width="34" height="34" stroke="white" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8v4"></path>
            <path d="M12 16h.01"></path>
          </svg>
        </div>
        <div class="otp-title">Verify OTP</div>
        <div class="otp-subtitle">
          Enter the 6-digit code sent to your registered mobile number to unlock your account.
          <div id="otpRolePill" class="otp-role-pill" style="display:none;"></div>
        </div>
      </div>
      <form id="otpForm" class="otp-form">
        <div class="otp-inputs">
          <input maxlength="1" class="otp-box" type="text" inputmode="numeric" />
          <input maxlength="1" class="otp-box" type="text" inputmode="numeric" />
          <input maxlength="1" class="otp-box" type="text" inputmode="numeric" />
          <input maxlength="1" class="otp-box" type="text" inputmode="numeric" />
          <input maxlength="1" class="otp-box" type="text" inputmode="numeric" />
          <input maxlength="1" class="otp-box" type="text" inputmode="numeric" />
        </div>
        <div id="otpMessage" class="otp-message"></div>
        <button type="submit" id="otpSubmit" class="otp-button">
          <span>Verify & Unlock</span>
        </button>
        <div class="otp-footer">
          Having trouble? Make sure you entered the latest OTP sent to your number.
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE_URL = (window.API_BASE_URL || 'http://localhost:4000/api') + '/login';

    const role = localStorage.getItem('role');
    const userId = localStorage.getItem('user_id');

    const card = document.getElementById('otpCard');
    const rolePill = document.getElementById('otpRolePill');
    const iconBadge = document.getElementById('otpIconBadge');

    // Apply theme based on role
    if (role && rolePill) {
      let label = '';
      let badgeGradient = '';
      if (role === 'farmer') {
        label = 'Farmer Account';
        badgeGradient = 'linear-gradient(135deg,#22c55e,#16a34a)';
      } else if (role === 'customer') {
        label = 'Customer Account';
        badgeGradient = 'linear-gradient(135deg,#22c55e,#16a34a)';
      } else if (role === 'delivery_agent') {
        label = 'Delivery Agent';
        badgeGradient = 'linear-gradient(135deg,#f97316,#ea580c)';
        card.style.boxShadow = '0 24px 80px rgba(248,113,22,0.35)';
      }
      if (label) {
        rolePill.textContent = label;
        rolePill.style.display = 'inline-flex';
      }
      if (badgeGradient) {
        iconBadge.style.background = badgeGradient;
      }
    }

    const boxes = Array.from(document.querySelectorAll('.otp-box'));
    const messageEl = document.getElementById('otpMessage');
    const submitBtn = document.getElementById('otpSubmit');

    boxes.forEach((box, idx) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '').slice(0, 1);
        if (box.value && idx < boxes.length - 1) {
          boxes[idx + 1].focus();
        }
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !box.value && idx > 0) {
          boxes[idx - 1].focus();
        }
      });
    });

    document.getElementById('otpForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const otp_code = boxes.map(b => b.value).join('');
      if (otp_code.length !== 6) {
        messageEl.textContent = 'Please enter the 6-digit OTP.';
        messageEl.className = 'otp-message error';
        return;
      }

      if (!userId || !role) {
        messageEl.textContent = 'Session expired. Please login again.';
        messageEl.className = 'otp-message error';
        return;
      }

      submitBtn.disabled = true;

      try {
        const res = await fetch(`${API_BASE_URL}/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, otp_code, role })
        });

        const data = await res.json();
        if (!res.ok) {
          messageEl.textContent = data.error || 'Invalid or expired OTP.';
          messageEl.className = 'otp-message error';
          submitBtn.disabled = false;
          boxes.forEach(b => (b.value = ''));
          boxes[0].focus();
          return;
        }

        messageEl.textContent = data.message || 'Account unlocked successfully. Redirecting...';
        messageEl.className = 'otp-message success';

        setTimeout(() => {
          if (role === 'delivery_agent') {
            window.location.href = 'deliveryboy.html';
          } else {
            window.location.href = 'index.html';
          }
        }, 1200);
      } catch (err) {
        console.error('OTP verify error:', err);
        messageEl.textContent = 'Server error. Please try again.';
        messageEl.className = 'otp-message error';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
