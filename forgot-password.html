<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Farm2Market</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #ecfdf3, #f9fafb);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .fp-shell { width: 100%; max-width: 480px; }
    .fp-card {
      background: white;
      border-radius: 1.25rem;
      padding: 2rem 2.25rem;
      box-shadow: 0 24px 80px rgba(15, 118, 110, 0.2);
      border: 1px solid rgba(16, 185, 129, 0.2);
      position: relative;
      overflow: hidden;
    }
    .fp-pill {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at -10% -10%, rgba(34, 197, 94, 0.2), transparent 50%),
                  radial-gradient(circle at 110% 110%, rgba(56, 189, 248, 0.18), transparent 55%);
    }
    .fp-header { position: relative; z-index: 1; text-align: center; margin-bottom: 1.5rem; }
    .fp-icon-badge {
      width: 70px; height: 70px; border-radius: 999px;
      margin: 0 auto 1rem auto;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 14px 35px rgba(22, 163, 74, 0.45);
    }
    .fp-icon-badge svg { width: 34px; height: 34px; stroke: white; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    .fp-title { font-size: 1.5rem; font-weight: 700; color: #064e3b; margin-bottom: 0.35rem; }
    .fp-subtitle { font-size: 0.92rem; color: #6b7280; line-height: 1.5; }
    .fp-form { position: relative; z-index: 1; margin-top: 1.5rem; }
    .fp-field { margin-bottom: 1rem; }
    .fp-field label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }
    .fp-field input {
      width: 100%; padding: 0.7rem 0.9rem;
      border-radius: 0.6rem;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
    }
    .fp-field input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
      background: #ffffff;
    }
    .fp-btn {
      width: 100%; padding: 0.75rem 1rem;
      border-radius: 999px; border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white; font-weight: 600; font-size: 0.95rem;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
      margin-top: 0.5rem;
    }
    .fp-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 30px rgba(22, 163, 74, 0.45); }
    .fp-btn:disabled { opacity: 0.5; cursor: default; box-shadow: none; transform: none; }
    .fp-message { min-height: 1.25rem; font-size: 0.88rem; margin: 0.75rem 0; text-align: center; }
    .fp-message.error { color: #b91c1c; }
    .fp-message.success { color: #15803d; }
    .fp-footer { margin-top: 1rem; font-size: 0.8rem; color: #6b7280; text-align: center; }
    .fp-footer a { color: #15803d; text-decoration: none; font-weight: 500; }
    .fp-footer a:hover { text-decoration: underline; }
    .fp-role-pills { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .fp-role-pill {
      padding: 0.4rem 0.9rem; border-radius: 999px;
      border: 1px solid #d1d5db; background: #f9fafb;
      font-size: 0.8rem; font-weight: 500; color: #6b7280;
      cursor: pointer; transition: all 0.2s ease;
      display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .fp-role-pill:hover { border-color: #22c55e; background: rgba(34, 197, 94, 0.05); }
    .fp-role-pill.active { border-color: #22c55e; background: rgba(34, 197, 94, 0.15); color: #047857; }
    .fp-role-pill input { display: none; }
    .fp-back-link {
      position: absolute; top: 1rem; left: 1rem; z-index: 2;
      font-size: 0.8rem; color: #6b7280; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .fp-back-link:hover { color: #15803d; }
    .fp-hint { color: #6b7280; font-size: 0.75rem; margin-top: 0.25rem; display: block; }
  </style>
</head>
<body>
  <div class="fp-shell">
    <div class="fp-card">
      <div class="fp-pill"></div>
      <a href="home.html" class="fp-back-link">← Back to Home</a>

      <div class="fp-header">
        <div class="fp-icon-badge">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        <div class="fp-title">Forgot Password</div>
        <div class="fp-subtitle">Enter your registered details to reset your password. Available for Customers, Farmers, and Delivery Agents only.</div>
      </div>

      <div class="fp-form">
        <label style="display:block; font-size:0.85rem; font-weight:600; color:#374151; margin-bottom:0.5rem;">Select your account type *</label>
        <div class="fp-role-pills" id="rolePills">
          <label class="fp-role-pill active">
            <input type="radio" name="fpRole" value="customer" checked />
            🛒 Customer
          </label>
          <label class="fp-role-pill">
            <input type="radio" name="fpRole" value="farmer" />
            🌾 Farmer
          </label>
          <label class="fp-role-pill">
            <input type="radio" name="fpRole" value="delivery_agent" />
            🚚 Delivery Agent
          </label>
        </div>

        <div class="fp-field">
          <label for="fpName">Your Name *</label>
          <input type="text" id="fpName" placeholder="Enter your registered name" />
        </div>

        <div class="fp-field">
          <label for="fpPhone">Phone Number *</label>
          <input type="tel" id="fpPhone" placeholder="Enter your registered phone number" />
        </div>

        <div class="fp-field">
          <label for="fpNewPass">New Password *</label>
          <input type="password" id="fpNewPass" placeholder="Enter new password" />
          <small id="fpPassHint" class="fp-hint">Must be a 4-digit numeric PIN</small>
        </div>

        <div class="fp-field">
          <label for="fpConfirmPass">Confirm Password *</label>
          <input type="password" id="fpConfirmPass" placeholder="Confirm new password" />
        </div>

        <div class="fp-message" id="formMessage"></div>
        <button type="button" class="fp-btn" id="resetPassBtn">Reset Password</button>
      </div>

      <div class="fp-footer">
        Remember your password? <a href="home.html" onclick="openLoginFromHome()">Login here</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = (window.API_BASE_URL || 'http://localhost:4000/api') + '/forgot-password';

    let selectedRole = 'customer';

    // Elements
    const rolePills = document.querySelectorAll('.fp-role-pill');
    const fpName = document.getElementById('fpName');
    const fpPhone = document.getElementById('fpPhone');
    const fpNewPass = document.getElementById('fpNewPass');
    const fpConfirmPass = document.getElementById('fpConfirmPass');
    const formMessage = document.getElementById('formMessage');
    const fpPassHint = document.getElementById('fpPassHint');
    const resetPassBtn = document.getElementById('resetPassBtn');

    // Pre-fill role from URL params
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('role')) {
      const preRole = urlParams.get('role');
      if (preRole === 'admin' || preRole === 'agri_specialist') {
        // Block admin and agri_specialist from this page
        document.querySelector('.fp-form').innerHTML = '<div style="text-align:center; padding: 2rem 0;"><p style="color:#b91c1c; font-weight:600; font-size:1rem;">This page is not available for ' + (preRole === 'admin' ? 'Admin' : 'Agri Specialist') + ' accounts.</p><p style="color:#6b7280; margin-top:0.5rem; font-size:0.9rem;">Please contact your ' + (preRole === 'admin' ? 'Super Admin' : 'Admin') + ' to reset your password.</p></div>';
      } else if (['customer', 'farmer', 'delivery_agent'].includes(preRole)) {
        selectedRole = preRole;
        rolePills.forEach(p => {
          const input = p.querySelector('input');
          if (input.value === preRole) {
            input.checked = true;
            p.classList.add('active');
          } else {
            p.classList.remove('active');
          }
        });
      }
    }

    // Role pill click handler
    rolePills.forEach(pill => {
      pill.addEventListener('click', () => {
        rolePills.forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        selectedRole = pill.querySelector('input').value;
        updatePasswordHint();
      });
    });

    function updatePasswordHint() {
      if (selectedRole === 'delivery_agent') {
        fpPassHint.textContent = 'Must be at least 4 characters';
      } else {
        fpPassHint.textContent = 'Must be a 4-digit numeric PIN';
      }
    }

    function showMsg(text, type) {
      formMessage.textContent = text;
      formMessage.className = 'fp-message ' + (type || '');
    }

    // Reset Password
    resetPassBtn.addEventListener('click', async () => {
      const name = fpName.value.trim();
      const phone = fpPhone.value.trim();
      const newPass = fpNewPass.value;
      const confirmPass = fpConfirmPass.value;

      // Validation
      if (!name) { showMsg('Please enter your name', 'error'); return; }
      if (!phone || phone.length < 10) { showMsg('Please enter a valid phone number', 'error'); return; }
      if (!newPass || !confirmPass) { showMsg('Please enter and confirm your new password', 'error'); return; }
      if (newPass !== confirmPass) { showMsg('Passwords do not match!', 'error'); return; }

      if (selectedRole === 'delivery_agent') {
        if (newPass.length < 4) { showMsg('Password must be at least 4 characters', 'error'); return; }
      } else {
        if (!/^\d{4}$/.test(newPass)) { showMsg('Password must be a 4-digit numeric PIN', 'error'); return; }
      }

      resetPassBtn.disabled = true;
      resetPassBtn.textContent = 'Resetting...';
      showMsg('', '');

      try {
        const response = await fetch(`${API_BASE}/reset`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: name,
            phone_no: phone,
            new_password: newPass,
            role: selectedRole
          })
        });

        const data = await response.json();

        if (!response.ok) {
          showMsg(data.error || 'Failed to reset password', 'error');
          resetPassBtn.disabled = false;
          resetPassBtn.textContent = 'Reset Password';
          return;
        }

        // Success
        showMsg(data.message + ' Redirecting to login...', 'success');
        resetPassBtn.disabled = true;
        setTimeout(() => { window.location.href = 'home.html'; }, 2500);
      } catch (error) {
        showMsg('Network error. Please try again.', 'error');
        resetPassBtn.disabled = false;
        resetPassBtn.textContent = 'Reset Password';
      }
    });

    function openLoginFromHome() {
      localStorage.setItem('openLoginOnLoad', 'true');
      window.location.href = 'home.html';
    }
  </script>
</body>
</html>
